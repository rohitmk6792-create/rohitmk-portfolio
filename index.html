<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohit MK | Cloud Computing Student</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
scroll-behavior:smooth;
}

body{
background:#0f172a;
color:white;
transition:0.4s;
}

body.light{
background:#f1f5f9;
color:#0f172a;
}

section{
padding:100px 10%;
}

h2{
text-align:center;
margin-bottom:40px;
font-size:32px;
}

header{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
z-index:1000;
}

nav a{
margin-left:20px;
text-decoration:none;
color:white;
font-weight:500;
}

body.light nav a{
color:#0f172a;
}

.toggle-btn{
cursor:pointer;
padding:8px 15px;
border-radius:20px;
background:#38bdf8;
border:none;
color:white;
}

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:45px;
}

.hero span{
color:#38bdf8;
}

.btn{
margin-top:25px;
display:inline-block;
padding:12px 30px;
background:#38bdf8;
border-radius:30px;
text-decoration:none;
color:white;
font-weight:600;
transition:0.3s;
border:none;
cursor:pointer;
}

.btn:hover{
transform:scale(1.05);
}

form{
max-width:500px;
margin:auto;
display:flex;
flex-direction:column;
gap:15px;
}

input, textarea{
padding:10px;
border:none;
border-radius:5px;
}

footer{
text-align:center;
padding:20px;
background:rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<header>
<div><strong>Rohit MK</strong></div>
<nav>
<a href="#home">Home</a>
<a href="#contact">Contact</a>
<button class="toggle-btn" onclick="toggleMode()">Toggle</button>
</nav>
</header>

<section class="hero" id="home">
<h1>Hello, I'm <span>Rohit MK</span></h1>
<p>Cloud Computing student passionate about AWS, DevOps and scalable cloud architecture.</p>
</section>

<section id="contact">
<h2>Contact Me</h2>
<form id="contact-form">
<input type="text" id="name" placeholder="Your Name" required>
<input type="email" id="email" placeholder="Your Email" required>
<textarea id="message" rows="5" placeholder="Your Message" required></textarea>
<button type="submit" class="btn">Send Message</button>
</form>
<p id="msg" style="text-align:center;margin-top:15px;"></p>
</section>

<footer>
© 2026 Rohit MK
</footer>

<script>

function toggleMode(){
document.body.classList.toggle("light");
}

/* SUPABASE CONFIG */
const supabaseUrl = "YOUR_SUPABASE_URL";
const supabaseKey = "YOUR_SUPABASE_ANON_KEY";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

/* FORM SUBMIT */
document.getElementById("contact-form").addEventListener("submit", async function(e){
e.preventDefault();

const name = document.getElementById("name").value;
const email = document.getElementById("email").value;
const message = document.getElementById("message").value;

const { data, error } = await supabase
.from("contact_messages")
.insert([{ name, email, message }]);

if(error){
document.getElementById("msg").innerHTML = "❌ Failed to send message.";
console.error("Supabase Error:", error.message);
} else {
document.getElementById("msg").innerHTML = "✅ Message sent successfully!";
document.getElementById("contact-form").reset();
}
});

</script>

</body>
</html>
